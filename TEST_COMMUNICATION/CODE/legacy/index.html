<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bracelet Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Bracelet Intelligent</h2>

Température: <span id="t">-</span> °C<br>
Humidité: <span id="h">-</span> %<br>
LED: <span id="led">-</span><br>
Buzzer: <span id="buzzer">-</span><br>
Touch: <span id="touch">-</span> <span id="touchraw"></span><br><br>

<button onclick="ledOn()">LED ON</button>
<button onclick="ledOff()">LED OFF</button>
<button onclick="buzzerOn()">BUZZER ON</button>
<button onclick="buzzerOff()">BUZZER OFF</button>

<canvas id="chart" width="600" height="300"></canvas>

<script>
const BASE = "http://192.168.4.1";

const temps = [];
const tempData = [];

const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: temps,
    datasets: [{
      label: "Température",
      data: tempData,
      tension: 0.3
    }]
  },
  options: {
    responsive: false,
    animation: false
  }
});

function setLedUI(on){
  document.getElementById("led").textContent = on ? "ON" : "OFF";
}

function setBuzzerUI(on){
  document.getElementById("buzzer").textContent = on ? "ON" : "OFF";
}

function setTouchUI(touchValue){
  const el = document.getElementById("touch");
  const raw = document.getElementById("touchraw");

  if (touchValue === undefined || touchValue === null) {
    el.textContent = "N/A";
    raw.textContent = "(raw: missing)";
    return;
  }

  const isTouched =
    (touchValue === true) ||
    (touchValue === 1) ||
    (touchValue === "1") ||
    (touchValue === "true") ||
    (touchValue === "on");

  el.textContent = isTouched ? "TOUCHED" : "RELEASED";
  raw.textContent = `(raw: ${String(touchValue)})`;
}

async function refresh(){
  try{
    const r = await fetch(`${BASE}/api/state`, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    // robust: if ESP ever returns "nan", make it parsable
    const raw = await r.text();
    const safe = raw.replace(/\bnan\b/gi, "null");
    const s = JSON.parse(safe);

    document.getElementById("t").textContent =
      (s.tempC != null) ? Number(s.tempC).toFixed(2) : "-";

    document.getElementById("h").textContent =
      (s.humPct != null) ? Number(s.humPct).toFixed(1) : "-";

    setLedUI(!!s.led);
    setBuzzerUI(!!s.buzzer);
    setTouchUI(s.touch);

    const now = new Date().toLocaleTimeString();

    if (s.tempC != null){
      temps.push(now);
      tempData.push(Number(s.tempC));

      if (temps.length > 20){
        temps.shift();
        tempData.shift();
      }
      chart.update();
    }
  } catch(e){
    console.log("Fetch error:", e);
    document.getElementById("touch").textContent = "DISCONNECTED";
    document.getElementById("touchraw").textContent = "";
  }
}

function ledOn(){
  fetch(`${BASE}/led?state=1`, { cache: "no-store" }).then(() => refresh());
}

function ledOff(){
  fetch(`${BASE}/led?state=0`, { cache: "no-store" }).then(() => refresh());
}

function buzzerOn(){
  fetch(`${BASE}/buzzer?state=1`, { cache: "no-store" }).then(() => refresh());
}

function buzzerOff(){
  fetch(`${BASE}/buzzer?state=0`, { cache: "no-store" }).then(() => refresh());
}

setInterval(refresh, 300);
refresh();
</script>

</body>
</html>
